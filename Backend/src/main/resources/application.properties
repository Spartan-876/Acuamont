# Hibernate comparará las entidades (@Entity) con el esquema de la base de datos al arrancar
# y ańadirá automáticamente las tablas o columnas que falten. Útil para desarrollo.
spring.jpa.hibernate.ddl-auto=update

# Configuración de la fuente de datos (DataSource).
# URL de conexión a MySQL. 'acceso' es el nombre de la base de datos local.
spring.datasource.url=jdbc:mysql://localhost:3306/acceso
# Usuario de la base de datos.
spring.datasource.username=root
# Contraseńa del usuario (vacía en este caso).
spring.datasource.password=123456

# Muestra en la consola todas las sentencias SQL que Hibernate ejecuta.
spring.jpa.show-sql=true

# Mantiene abierta la sesión de Hibernate durante toda la petición HTTP.
# Evita errores de carga diferida (LazyInitializationException) en la capa de vista.
spring.jpa.open-in-view=true

jwt.secret=miClaveSecretaSuperSeguraDeAlMenos32Caracteres123
jwt.expiration=28800000
