# Hibernate comparara las entidades (@Entity) con el esquema de la base de datos al arrancar
# y anadira automaticamente las tablas o columnas que falten. Util para desarrollo.
spring.jpa.hibernate.ddl-auto=update

# Configuracion de la fuente de datos (DataSource).
# URL de conexion a MySQL. 'acceso' es el nombre de la base de datos local.
spring.datasource.url=jdbc:mysql://localhost:3306/acceso

# Usuario de la base de datos.
spring.datasource.username=root

# Contrasena del usuario.
spring.datasource.password=123456

# Muestra en la consola todas las sentencias SQL que Hibernate ejecuta.
spring.jpa.show-sql=true

# Mantiene abierta la sesion de Hibernate durante toda la peticion HTTP.
spring.jpa.open-in-view=true

jwt.secret=miClaveSecretaSuperSeguraDeAlMenos32Caracteres123
jwt.expiration=28800000